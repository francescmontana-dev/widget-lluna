<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widget lunar compacte</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:rgba(15,23,42,.82);
      --panel-2:rgba(255,255,255,.04);
      --text:#eef4ff;
      --muted:#a9b6cf;
      --line:rgba(255,255,255,.10);
      --glow:rgba(148,197,255,.18);
      --shadow:0 12px 34px rgba(0,0,0,.28);
      --radius:22px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:transparent;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
    }

    .widget{
      width:min(100%, 540px);
      min-height:168px;
      display:grid;
      grid-template-columns:140px 1fr;
      gap:16px;
      padding:16px;
      border-radius:var(--radius);
      border:1px solid var(--line);
      background:
        radial-gradient(circle at 85% 15%, rgba(148,197,255,.10), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)),
        var(--panel);
      box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
      overflow:hidden;
      position:relative;
    }

    .widget:before{
      content:"";
      position:absolute;
      inset:auto auto -38px -38px;
      width:110px;
      height:110px;
      border-radius:50%;
      background:radial-gradient(circle, var(--glow), transparent 70%);
      pointer-events:none;
    }

    .left{
      display:grid;
      place-items:center;
      align-content:center;
      position:relative;
    }

    .right{
      display:grid;
      grid-template-rows:auto auto auto 1fr;
      gap:6px;
      min-width:0;
    }

    .eyebrow{
      font-size:.78rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .phase{
      font-size:1.35rem;
      font-weight:700;
      line-height:1.15;
    }

    .desc{
      font-size:.94rem;
      color:var(--muted);
      margin-top:-2px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:10px;
      margin-top:6px;
    }

    .stat{
      background:var(--panel-2);
      border:1px solid var(--line);
      border-radius:15px;
      padding:10px 11px;
      min-width:0;
    }

    .label{
      font-size:.74rem;
      color:var(--muted);
      margin-bottom:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .value{
      font-size:.98rem;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .bottom{
      display:flex;
      align-items:end;
      justify-content:space-between;
      gap:10px;
      margin-top:3px;
      color:var(--muted);
      font-size:.76rem;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
      background:rgba(255,255,255,.03);
      white-space:nowrap;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#dbeafe;
      box-shadow:0 0 10px rgba(219,234,254,.7);
    }

    svg{display:block}

    @media (max-width: 520px){
      .widget{
        grid-template-columns:1fr;
        width:100%;
      }
      .left{
        margin-top:2px;
      }
      .stats{
        grid-template-columns:1fr 1fr;
      }
      .bottom{
        flex-direction:column;
        align-items:flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="left">
      <svg id="moonSvg" width="112" height="112" viewBox="0 0 112 112" aria-label="Lluna actual">
        <defs>
          <clipPath id="moonClip">
            <circle cx="56" cy="56" r="36"></circle>
          </clipPath>
          <radialGradient id="moonLight" cx="35%" cy="30%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="70%" stop-color="#ececec"/>
            <stop offset="100%" stop-color="#d2d2d2"/>
          </radialGradient>
        </defs>

        <circle cx="56" cy="56" r="49" fill="rgba(255,255,255,.04)"></circle>
        <circle cx="56" cy="56" r="36" fill="#0f172a" stroke="rgba(255,255,255,.12)" stroke-width="1.4"></circle>

        <g clip-path="url(#moonClip)">
          <circle cx="56" cy="56" r="36" fill="url(#moonLight)"></circle>
          <ellipse id="shadowEllipse" cx="56" cy="56" rx="36" ry="36" fill="#0f172a"></ellipse>
        </g>

        <circle cx="47" cy="44" r="4.1" fill="rgba(0,0,0,.08)"></circle>
        <circle cx="66" cy="62" r="5.6" fill="rgba(0,0,0,.06)"></circle>
        <circle cx="57" cy="55" r="2.8" fill="rgba(0,0,0,.05)"></circle>
        <circle cx="70" cy="42" r="3.2" fill="rgba(0,0,0,.05)"></circle>
      </svg>
    </div>

    <div class="right">
      <div class="eyebrow">El Masnou NE</div>
      <div class="phase" id="phaseName">Calculant...</div>
      <div class="desc" id="phaseText">Actualitzant dades lunars</div>

      <div class="stats">
        <div class="stat">
          <div class="label">Il·luminació</div>
          <div class="value" id="illumination">—</div>
        </div>
        <div class="stat">
          <div class="label">Edat</div>
          <div class="value" id="moonAge">—</div>
        </div>
        <div class="stat">
          <div class="label">Plena</div>
          <div class="value" id="nextFull">—</div>
        </div>
      </div>

      <div class="bottom">
        <div class="badge"><span class="dot"></span><span id="trend">—</span></div>
        <div id="updatedAt">—</div>
      </div>
    </div>
  </div>

  <script>
    const SYNODIC_MONTH = 29.530588853;
    const KNOWN_NEW_MOON = new Date('2000-01-06T18:14:00Z');

    function moonData(date = new Date()){
      const days = (date - KNOWN_NEW_MOON) / 86400000;
      const age = ((days % SYNODIC_MONTH) + SYNODIC_MONTH) % SYNODIC_MONTH;
      const phase = age / SYNODIC_MONTH;
      const illumination = (1 - Math.cos(2 * Math.PI * phase)) / 2;
      return { age, phase, illumination };
    }

    function phaseName(age){
      if (age < 1.84566) return "Lluna nova";
      if (age < 5.53699) return "Creixent fina";
      if (age < 9.22831) return "Quart creixent";
      if (age < 12.91963) return "Gibosa creixent";
      if (age < 16.61096) return "Lluna plena";
      if (age < 20.30228) return "Gibosa minvant";
      if (age < 23.99361) return "Quart minvant";
      if (age < 27.68493) return "Minvant fina";
      return "Lluna nova";
    }

    function fmtDate(d){
      return new Intl.DateTimeFormat('ca-ES', {
        day:'numeric',
        month:'short'
      }).format(d);
    }

    function fmtDateTime(d){
      return new Intl.DateTimeFormat('ca-ES', {
        day:'numeric',
        month:'short',
        hour:'2-digit',
        minute:'2-digit'
      }).format(d);
    }

    function nextPhaseDate(targetAge, fromDate = new Date()){
      const { age } = moonData(fromDate);
      let delta = targetAge - age;
      if (delta <= 0) delta += SYNODIC_MONTH;
      return new Date(fromDate.getTime() + delta * 86400000);
    }

    function drawMoon(phase){
  const shadow = document.getElementById('shadowEllipse');
  const waxing = phase <= 0.5;
  const cosv = Math.cos(2 * Math.PI * phase);
  let rx = Math.abs(cosv) * 36;

  // 🌕 CAS ESPECIAL: lluna plena
  if (Math.abs(phase - 0.5) < 0.02){
    shadow.setAttribute('rx', 0);
    return;
  }

  // 🌑 CAS ESPECIAL: lluna nova
  if (phase < 0.02 || phase > 0.98){
    shadow.setAttribute('rx', 36);
    shadow.setAttribute('cx', 56);
    return;
  }

  if (rx < 0.5) rx = 0.5;

  if (waxing){
    shadow.setAttribute('cx', 56 - (36 - rx));
  } else {
    shadow.setAttribute('cx', 56 + (36 - rx));
  }

  shadow.setAttribute('rx', rx);
}
    }

    function updateWidget(){
      const now = new Date();
      const data = moonData(now);
      const phase = phaseName(data.age);
      const trend = data.phase < 0.5 ? "Fase creixent" : "Fase minvant";

      document.getElementById('phaseName').textContent = phase;
      document.getElementById('phaseText').textContent =
        phase === "Lluna nova" || phase === "Lluna plena"
          ? "Aspecte actual de la Lluna"
          : "Forma actual del disc lunar";
      document.getElementById('illumination').textContent =
        `${(data.illumination * 100).toFixed(1).replace('.', ',')} %`;
      document.getElementById('moonAge').textContent =
        `${data.age.toFixed(1).replace('.', ',')} dies`;
      document.getElementById('nextFull').textContent =
        fmtDate(nextPhaseDate(SYNODIC_MONTH / 2, now));
      document.getElementById('trend').textContent = trend;
      document.getElementById('updatedAt').textContent =
        `Actualitzat ${fmtDateTime(now)}`;

      drawMoon(data.phase);
    }

    updateWidget();
    setInterval(updateWidget, 60 * 60 * 1000);
  </script>
</body>
</html>
